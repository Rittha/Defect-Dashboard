<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Factory Signage System</title>
    <style>
        /* ล้างค่าเริ่มต้นของ Browser */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #000;
            overflow: hidden; /* ห้ามมีแถบเลื่อน */
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* ส่วนแสดงวิดีโอเต็มจอ */
        #display-section {
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover; /* ขยายให้เต็มพื้นที่จอพอดี */
        }

        /* ปุ่มเริ่มระบบ (จะหายไปเมื่อกด) */
        #start-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            color: #fff;
            font-family: sans-serif;
        }

        #start-button {
            padding: 20px 40px;
            font-size: 24px;
            cursor: pointer;
            background: #28a745;
            color: white;
            border: none;
            border-radius: 50px;
            font-weight: bold;
            box-shadow: 0 0 20px rgba(40, 167, 69, 0.5);
        }

        /* แผงควบคุมแบบซ่อน (Hover เพื่อแสดง) */
        #admin-panel {
            position: fixed;
            top: 0;
            right: 0;
            padding: 20px;
            background: rgba(0, 0, 0, 0.8);
            color: #fff;
            opacity: 0; /* ซ่อนไว้ */
            transition: opacity 0.5s;
            z-index: 100;
            border-bottom-left-radius: 15px;
            font-family: sans-serif;
        }

            #admin-panel:hover {
                opacity: 1; /* แสดงผลเมื่อเอาเมาส์ไปชี้ */
            }

        .upload-status {
            font-size: 12px;
            margin-top: 10px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <!-- หน้ากากเริ่มต้นเพื่อเปิดระบบเสียง -->
    <div id="start-overlay">
        <h1>NICHIAS SIGNAGE SYSTEM</h1>
        <button id="start-button" onclick="startDisplay()">START DISPLAY</button>
    </div>

    <!-- ส่วนแสดงวิดีโอ -->
    <div id="display-section">
        <video id="player" loop playsinline>
            <source id="videoSource" src="/uploads/display_video.mp4" type="video/mp4">
        </video>
    </div>

    <!-- แผงควบคุมลับ (เอาเมาส์ไปชี้มุมขวาบนถึงจะเห็น) -->
    <div id="admin-panel">
        <p style="margin-bottom: 10px;">จัดการวิดีโอโฆษณา</p>
        <input type="file" id="fileInput" accept="video/mp4">
        <button onclick="uploadFile()" style="margin-top:10px; cursor:pointer;">อัปโหลดไฟล์ใหม่</button>
        <div id="status" class="upload-status"></div>
    </div>

    <script>
        const video = document.getElementById('player');
        const source = document.getElementById('videoSource');
        const overlay = document.getElementById('start-overlay');

        function startDisplay() {
            overlay.style.display = 'none';
            video.muted = false; // เปิดเสียง
            refreshVideo();
        }

        function refreshVideo() {
            source.src = "/uploads/display_video.mp4?t=" + new Date().getTime();
            video.load();
            video.play().catch(e => console.log("Waiting for user interaction"));
        }

        async function uploadFile() {
            const fileInput = document.getElementById('fileInput');
            if (fileInput.files.length === 0) return;

            const statusEl = document.getElementById('status');
            statusEl.innerText = "(กำลังอัปโหลด)...";
            statusEl.style.color = "orange";

            const formData = new FormData();
            formData.append('mediaFile', fileInput.files[0]);

            try {
                const response = await fetch('/upload', { method: 'POST', body: formData });
                if (response.ok) {
                    statusEl.innerText = "อัปโหลดสำเร็จ!";
                    statusEl.style.color = "#00ff00";
                    setTimeout(refreshVideo, 1000);
                }
            } catch (err) {
                statusEl.innerText = "Error: เชื่อมต่อไม่ได้";
                statusEl.style.color = "red";
            }
        }
    </script>
</body>
</html>
