<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nichias Cloud Signage System</title>
    <style>
        /* สไตล์หน้าจอเต็มจอแบบไม่มีขอบ */
        body { margin: 0; background: #000; overflow: hidden; width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; }
        video { width: 100%; height: 100%; object-fit: cover; z-index: 1; }

        /* แผงควบคุมลับ (Hover เพื่อแสดง) */
        #admin-panel { 
            position: fixed; top: 10px; right: 10px; 
            background: rgba(0,0,0,0.8); color: #fff; padding: 20px; 
            opacity: 0; transition: 0.5s; z-index: 100; 
            border-radius: 12px; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            border: 1px solid #444;
        }
        #admin-panel:hover { opacity: 1; }
        
        button { 
            background: #0078d4; color: white; border: none; padding: 10px 15px; 
            border-radius: 5px; cursor: pointer; margin-top: 10px; width: 100%;
        }
        button:disabled { background: #555; }
        .status-text { font-size: 12px; margin-top: 8px; color: #aaa; }
    </style>
</head>
<body>

    <!-- ส่วนแสดงวิดีโอ -->
    <video id="player" loop muted autoplay playsinline></video>

    <!-- แผงควบคุม (เอาเมาส์มาชี้ที่มุมขวาบน) -->
    <div id="admin-panel">
        <strong style="display:block; margin-bottom:10px;">Cloud Control Panel</strong>
        <input type="file" id="fileInput" accept="video/mp4" style="font-size:12px;">
        <button onclick="uploadToFirebase()" id="btnUpload">Upload to Cloud</button>
        <div id="status" class="status-text">Ready</div>
    </div>

    <!-- โหลด Firebase SDK แบบ Compat เพื่อความง่ายในการเขียน script -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-storage-compat.js"></script>

    <script>
        // 1. นำค่า Config ของพี่มาใส่ตรงนี้
        const firebaseConfig = {
            apiKey: "AIzaSyD_QngcLOyJdTFsG8SjJpOlsa7DgHNV1FU",
            authDomain: "qc-dashboad.firebaseapp.com",
            projectId: "qc-dashboad",
            storageBucket: "qc-dashboad.firebasestorage.app",
            messagingSenderId: "875270177668",
            appId: "1:875270177668:web:7cee8a67f9f5d7b2e7d3d1",
            measurementId: "G-9Q4DWNRW2E"
        };

        // 2. เริ่มต้นระบบ Firebase
        firebase.initializeApp(firebaseConfig);
        const storage = firebase.storage();
        const player = document.getElementById('player');
        const status = document.getElementById('status');
        const btn = document.getElementById('btnUpload');

        // 3. ฟังก์ชันดึงวิดีโอจาก Cloud มาเล่น
        function refreshVideo() {
            const storageRef = storage.ref('display_video.mp4');
            storageRef.getDownloadURL().then((url) => {
                player.src = url;
                player.play();
                status.innerText = "สถานะ: กำลังเล่นวิดีโอจาก Cloud";
            }).catch((error) => {
                status.innerText = "ยังไม่มีไฟล์บน Cloud กรุณาอัปโหลดไฟล์แรก";
            });
        }

        // 4. ฟังก์ชันอัปโหลดไฟล์
        async function uploadToFirebase() {
            const file = document.getElementById('fileInput').files[0];
            if (!file) return alert("กรุณาเลือกไฟล์วิดีโอก่อนครับ");

            btn.disabled = true;
            status.innerText = "กำลังอัปโหลด... กรุณารอสักครู่";

            const storageRef = storage.ref('display_video.mp4');
            
            try {
                await storageRef.put(file);
                status.innerText = "อัปโหลดสำเร็จ! กำลังรีเฟรชหน้าจอ...";
                status.style.color = "#4caf50";
                setTimeout(() => {
                    refreshVideo();
                    btn.disabled = false;
                }, 2000);
            } catch (e) {
                console.error(e);
                status.innerText = "เกิดข้อผิดพลาด: " + e.message;
                status.style.color = "#f44336";
                btn.disabled = false;
            }
        }

        // เริ่มโหลดวิดีโอทันทีที่เปิดหน้าเว็บ
        refreshVideo();
    </script>
</body>
</html>
